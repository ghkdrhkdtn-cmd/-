<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐬 돌고래하우스 — 신축빌라 분양 실무 지식</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a1628;--blue:#1254a4;--cyan:#00c2d4;--gold:#f5a623;--green:#00c853;--red:#ff3d57;--purple:#7c4dff;--card-bg:#111f38;--card-border:#1e3a5f;--text:#e8f2ff;--muted:#6a90b8;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--navy);color:var(--text);min-height:100vh;}
.header{background:linear-gradient(135deg,#071020,#0d1e38,#0a1628);border-bottom:2px solid var(--cyan);padding:24px 20px 20px;text-align:center;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,194,212,.12),transparent 65%);}
.header-logo{font-family:'Black Han Sans',sans-serif;font-size:28px;color:var(--cyan);letter-spacing:2px;position:relative;}
.header-logo span{color:var(--gold);}
.header-sub{font-size:13px;color:var(--muted);margin-top:4px;position:relative;}
.main{max-width:960px;margin:0 auto;padding:24px 16px 80px;}
.slabel{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--cyan);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.slabel::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--card-border),transparent);}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:36px;}
.card{background:linear-gradient(135deg,#22c55e,#16a34a);border-radius:14px;padding:20px 16px 18px;cursor:pointer;transition:transform .18s,box-shadow .18s;position:relative;overflow:hidden;user-select:none;border:none;width:100%;text-align:left;}
.card::before{content:'';position:absolute;top:-30px;right:-30px;width:80px;height:80px;background:rgba(255,255,255,.08);border-radius:50%;}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,200,83,.3);}
.card:active{transform:translateY(0);}
.cico{font-size:22px;margin-bottom:10px;}
.ctit{font-size:14px;font-weight:800;color:#0a2800;line-height:1.4;}
.cbadge{position:absolute;top:10px;right:10px;background:rgba(255,255,255,.25);border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;}
.card.b{background:linear-gradient(135deg,#3b82f6,#1d4ed8);}.card.b .ctit{color:#fff;}.card.b:hover{box-shadow:0 10px 30px rgba(59,130,246,.4);}
.card.g{background:linear-gradient(135deg,#f59e0b,#d97706);}.card.g .ctit{color:#1a0800;}.card.g:hover{box-shadow:0 10px 30px rgba(245,158,11,.4);}
.card.r{background:linear-gradient(135deg,#ef4444,#b91c1c);}.card.r .ctit{color:#fff;}.card.r:hover{box-shadow:0 10px 30px rgba(239,68,68,.4);}
.card.p{background:linear-gradient(135deg,#8b5cf6,#6d28d9);}.card.p .ctit{color:#fff;}.card.p:hover{box-shadow:0 10px 30px rgba(139,92,246,.4);}
.card.c{background:linear-gradient(135deg,#06b6d4,#0891b2);}.card.c .ctit{color:#fff;}.card.c:hover{box-shadow:0 10px 30px rgba(6,182,212,.4);}
.card.d{background:linear-gradient(135deg,#374151,#1f2937);}.card.d .ctit{color:#fff;}
.ov{position:fixed;inset:0;background:rgba(5,12,25,.92);backdrop-filter:blur(4px);z-index:9999;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.ov.open{opacity:1;pointer-events:all;}
.modal{background:linear-gradient(180deg,#14253d,#0d1a2e);border:1px solid var(--card-border);border-radius:20px 20px 0 0;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;padding:0 0 40px;transform:translateY(40px);transition:transform .3s cubic-bezier(.22,1,.36,1);}
.ov.open .modal{transform:translateY(0);}
.modal::-webkit-scrollbar{width:4px;}.modal::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:2px;}
.mhandle{width:40px;height:4px;background:var(--card-border);border-radius:2px;margin:12px auto 0;}
.mhead{padding:20px 24px 16px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;gap:12px;position:sticky;top:0;background:#14253d;z-index:2;}
.mheadico{font-size:28px;}
.mheadtit{font-family:'Black Han Sans',sans-serif;font-size:20px;color:var(--cyan);line-height:1.2;flex:1;}
.mclose{width:34px;height:34px;background:var(--card-bg);border:1px solid var(--card-border);border-radius:50%;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mclose:hover{color:var(--red);border-color:var(--red);}
.mbody{padding:24px 24px 0;}
.def{background:rgba(0,194,212,.08);border-left:3px solid var(--cyan);border-radius:0 8px 8px 0;padding:16px 18px;margin-bottom:18px;font-size:14px;line-height:1.95;}
.irow{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start;}
.irow .lb{background:var(--blue);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0;margin-top:2px;}
.irow .vl{font-size:13px;line-height:1.85;color:var(--text);}
.cgd{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.cb{background:var(--card-bg);border:1px solid var(--card-border);border-radius:10px;padding:16px;}
.cb h4{font-size:13px;font-weight:700;color:var(--cyan);margin-bottom:10px;}
.cb p{font-size:13px;line-height:1.85;color:#aac0d8;}
.tip{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);border-radius:10px;padding:16px 18px;margin:16px 0;font-size:13px;line-height:1.95;color:#f5c06a;}
.tip strong{color:var(--gold);}
.wrn{background:rgba(255,61,87,.08);border:1px solid rgba(255,61,87,.25);border-radius:10px;padding:16px 18px;margin:16px 0;font-size:13px;line-height:1.95;color:#ff8f9e;}
.wrn strong{color:var(--red);}
.ref{background:rgba(100,116,139,.08);border:1px solid rgba(100,116,139,.2);border-radius:10px;padding:16px 18px;margin:10px 0;font-size:13px;line-height:1.95;color:#cbd5e1;}
.slist{margin:14px 0;}
.si{display:flex;gap:14px;margin-bottom:14px;align-items:flex-start;}
.sn{width:30px;height:30px;background:var(--blue);border-radius:50%;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;min-width:30px;}
.sn.gn{background:var(--green);}
.sn.rn{background:var(--red);}
.sn.gold{background:var(--gold);color:#1a0800;}
.st{font-size:13px;line-height:1.9;color:var(--text);}
.st strong{color:var(--cyan);}
.msub{font-size:12px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin:22px 0 12px;padding-bottom:7px;border-bottom:1px solid var(--card-border);}
.fbox{background:linear-gradient(135deg,rgba(18,84,164,.3),rgba(0,194,212,.1));border:1px solid var(--blue);border-radius:10px;padding:18px;text-align:center;margin:16px 0;font-size:15px;font-weight:700;color:#fff;line-height:2;}
.tbl{width:100%;border-collapse:collapse;font-size:13px;margin:14px 0;}
.tbl th{background:var(--card-bg);padding:10px 12px;text-align:left;color:var(--muted);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--card-border);}
.tbl td{padding:10px 12px;border-bottom:1px solid rgba(30,58,95,.4);color:var(--text);line-height:1.7;}
.tbl tr:hover td{background:rgba(30,95,168,.08);}
.hc{color:var(--cyan);font-weight:700;}.hg{color:var(--gold);font-weight:700;}.hr{color:var(--red);font-weight:700;}.hgr{color:var(--green);font-weight:700;}
.subbtn{display:flex;align-items:center;gap:10px;width:100%;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.3);color:#e0b060;border-radius:10px;padding:16px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;text-align:left;margin-top:16px;transition:background .15s;}
.subbtn:hover{background:rgba(245,158,11,.15);}
.subbtn .arr{margin-left:auto;transition:transform .2s;}
.subbtn.open .arr{transform:rotate(180deg);}
.subinner{display:none;background:rgba(10,18,35,.85);border:1px solid rgba(245,158,11,.15);border-radius:10px;padding:20px;margin-top:8px;font-size:13.5px;line-height:2;color:#c8d8ec;}
.subinner.open{display:block;}
.subinner h4{display:none;}

.subinner .danger{color:#ff9aaa;font-weight:700;}
.subinner .note{background:rgba(255,61,87,.07);border:1px solid rgba(255,61,87,.2);border-radius:8px;padding:12px 14px;margin:12px 0;font-size:13px;line-height:1.9;color:#ffb3c0;}
.hr-line{height:1px;background:var(--card-border);margin:20px 0;}
p{font-size:13px;line-height:1.9;color:var(--text);margin-bottom:12px;}
.sect-lead{font-size:13px;font-weight:700;color:var(--gold);margin:22px 0 8px 0;display:block;padding-bottom:5px;border-bottom:1px solid rgba(245,166,35,.2);}
</style>
</head>
<body>
<div class="header">
  <div class="header-logo">🐬 돌고래<span>하우스</span></div>
  <div class="header-sub">신축빌라 분양 실무 지식 — 카드를 클릭하면 자세한 내용을 볼 수 있어요</div>
</div>
<div class="main">

<div class="slabel">🏠 매매절차 &amp; 대출구조</div>
<div class="cgrid">
  <button class="card b" onclick="openModal('매매절차')"><div class="cbadge">🏠</div><div class="cico">📋</div><div class="ctit">신축빌라 매매절차 A to Z</div></button>
  <button class="card" onclick="openModal('전액대출')"><div class="cbadge">💡</div><div class="cico">🏦</div><div class="ctit">전액대출·무입주 — 사기야? 진짜야?</div></button>
  <button class="card b" onclick="openModal('담보신용')"><div class="cbadge">📊</div><div class="cico">⚖️</div><div class="ctit">담보대출 vs 신용대출 차이</div></button>
  <button class="card c" onclick="openModal('LTV_DSR')"><div class="cbadge">📐</div><div class="cico">📐</div><div class="ctit">LTV · DSR · DTI 쉽게 이해하기</div></button>
  <button class="card p" onclick="openModal('후순위')"><div class="cbadge">➕</div><div class="cico">🔗</div><div class="ctit">후순위 대출·은행융자 뜻</div></button>
  <button class="card d" onclick="openModal('감정평가')"><div class="cbadge">🔍</div><div class="cico">🔍</div><div class="ctit">감정평가 금액이 뭐야?</div></button>
</div>

<div class="slabel">💰 세금 &amp; 비용</div>
<div class="cgrid">
  <button class="card g" onclick="openModal('취등록세')"><div class="cbadge">🏷️</div><div class="cico">📜</div><div class="ctit">취득세·등록세 — 주택 vs 오피스텔</div></button>
  <button class="card g" onclick="openModal('리베이트')"><div class="cbadge">💎</div><div class="cico">💰</div><div class="ctit">분양 리베이트(R)란? 법적 지위는?</div></button>
  <button class="card" onclick="openModal('실입금')"><div class="cbadge">🧮</div><div class="cico">🧮</div><div class="ctit">실입주금 계산 공식</div></button>
  <button class="card g" onclick="openModal('보유세')"><div class="cbadge">🏛️</div><div class="cico">🏛️</div><div class="ctit">재산세 · 종부세 — 빌라는 얼마?</div></button>
</div>

<div class="slabel">📈 신용 &amp; 대출 전략</div>
<div class="cgrid">
  <button class="card r" onclick="openModal('저신용')"><div class="cbadge">🆘</div><div class="cico">🆘</div><div class="ctit">저신용자도 대출 받는 경우의 수</div></button>
  <button class="card b" onclick="openModal('기대출')"><div class="cbadge">🔧</div><div class="cico">🔧</div><div class="ctit">기대출 많을 때 해결하는 법</div></button>
  <button class="card p" onclick="openModal('사업자')"><div class="cbadge">🏢</div><div class="cico">🏢</div><div class="ctit">사업자 대출 · 회사채 활용법</div></button>
  <button class="card c" onclick="openModal('스트레스')"><div class="cbadge">⚡</div><div class="cico">⚡</div><div class="ctit">2026 스트레스 DSR 규제 총정리</div></button>
</div>

<div class="slabel">📖 부동산 핵심 용어</div>
<div class="cgrid">
  <button class="card b" onclick="openModal('근저당')"><div class="cbadge">🔗</div><div class="cico">🔗</div><div class="ctit">근저당 — 집에 묶인 빚의 표시</div></button>
  <button class="card" onclick="openModal('압류')"><div class="cbadge">🚫</div><div class="cico">🚫</div><div class="ctit">압류·가처분·예고등기 차이</div></button>
  <button class="card c" onclick="openModal('선후순위')"><div class="cbadge">🥇</div><div class="cico">🥇</div><div class="ctit">선순위 vs 후순위 — 순서가 왜 중요한가</div></button>
  <button class="card g" onclick="openModal('전입확정')"><div class="cbadge">📅</div><div class="cico">📅</div><div class="ctit">전입신고·확정일자 — 세입자 보호 무기</div></button>
  <button class="card p" onclick="openModal('공시가')"><div class="cbadge">💹</div><div class="cico">💹</div><div class="ctit">공시가 vs 감정가 vs 시세 차이</div></button>
  <button class="card d" onclick="openModal('소유권')"><div class="cbadge">🔑</div><div class="cico">🔑</div><div class="ctit">소유권 이전 등기 — 집이 진짜 내 것이 되는 순간</div></button>
  <button class="card" onclick="openModal('대지지분')"><div class="cbadge">📐</div><div class="cico">📐</div><div class="ctit">대지지분·건폐율·용적률 쉽게 이해</div></button>
  <button class="card b" onclick="openModal('채권최고')"><div class="cbadge">💰</div><div class="cico">💰</div><div class="ctit">채권최고액 — 은행이 을구에 적는 숫자</div></button>
</div>

<div class="slabel">🔑 현장 실무</div>
<div class="cgrid">
  <button class="card" onclick="openModal('체크리스트')"><div class="cbadge">✅</div><div class="cico">✅</div><div class="ctit">계약 전 꼭 확인할 체크리스트</div></button>
  <button class="card b" onclick="openModal('전세사기')"><div class="cbadge">🚨</div><div class="cico">🚨</div><div class="ctit">전세사기 유형 &amp; 신축빌라 안전 기준</div></button>
  <button class="card d" onclick="openModal('등기부')"><div class="cbadge">📄</div><div class="cico">📄</div><div class="ctit">등기부등본 읽는 법</div></button>
  <button class="card" onclick="openModal('스크립트')"><div class="cbadge">📞</div><div class="cico">📞</div><div class="ctit">황과장 상담 스크립트 흐름</div></button>
  <button class="card p" onclick="openModal('용어사전')"><div class="cbadge">📚</div><div class="cico">📚</div><div class="ctit">분양 현장 필수 용어 사전</div></button>
  <button class="card r" onclick="openModal('광고금지')"><div class="cbadge">⚠️</div><div class="cico">⚠️</div><div class="ctit">광고 금지 · 분양가 노출 금지 이유</div></button>
</div>

</div>

<div class="ov" id="ov" onclick="handleOvClick(event)">
  <div class="modal" id="modal">
    <div class="mhandle"></div>
    <div class="mhead">
      <div class="mheadico" id="mIco"></div>
      <div class="mheadtit" id="mTit"></div>
      <button class="mclose" onclick="closeModal()">✕</button>
    </div>
    <div class="mbody" id="mBody"></div>
  </div>
</div>
<script>
var C = {};

C['매매절차'] = {ico:'📋', tit:'신축빌라 매매절차 A to Z', html: (function(){
return '<div class="def">신축빌라 분양은 일반 아파트와 구조가 달라요. 아파트는 계약금 → 중도금(여러 번) → 잔금 순서인데, 신축빌라는 <strong>계약금 → 잔금</strong> 두 단계가 대부분이에요. 중간에 여러 번 돈이 나가지 않아서 자금 흐름 관리가 훨씬 쉽습니다. 이 절차를 처음부터 끝까지 이해하면 고객 상담 시 훨씬 자신 있게 설명할 수 있어요.</div>'

+'<p class="sect-lead"><strong>① 매물 탐색 단계</strong></p>'
+'<p>고객과 상담을 시작하면 가장 먼저 어떤 물건이 맞는지 파악해야 해요. 현장을 직접 방문하기 전에 속지(분양 안내지)를 통해 <strong>실입주금, 분양가, 구조(방 수·화장실 수), 주차 가능 여부, 취득세 지원 여부, R(리베이트) 금액</strong>을 먼저 확인해요. 이 정보를 미리 파악해야 고객에게 적합한 물건을 추천할 수 있어요. 지역은 서울, 경기, 인천 전반을 커버하되 고객의 직장 위치, 자녀 학군, 대중교통 접근성을 고려해서 좁혀가세요.</p>'
+'<p>현장 방문 시에는 단순히 집을 보는 게 아니라 <strong>주변 환경 전체를 체크</strong>해야 해요. 초·중·고 거리, 마트·병원·은행 접근성, 버스 정류장·지하철역 도보 거리, 주차장 구조(자주식인지 기계식인지), 층간소음 여부(바닥 두께·단독 vs 공동구조), 채광(남향인지), 창문 크기, 마감재 품질까지 꼼꼼히 봐야 합니다. 고객이 감정적으로 집에 끌리도록 만드는 건 현장에서의 경험이에요.</p>'

+'<p class="sect-lead"><strong>② 계약 체결 단계</strong></p>'
+'<p>물건이 결정되면 계약을 진행해요. <strong>계약금</strong>은 일반적으로 분양가의 10%인데, 신축빌라는 분양사마다 다르고 돌고래하우스 기준으로는 <strong>100만원 선</strong>으로 진행하는 경우가 많아요. 계약금이 낮다는 건 초기 부담이 적다는 의미이고, 이게 고객 입장에서 큰 장점이에요.</p>'

C['전액대출'] = {ico:'🏦', tit:'전액대출·무입주 — 사기야? 진짜야?', html: (function(){

C['LTV_DSR'] = {ico:'📐', tit:'LTV · DSR · DTI 쉽게 이해하기', html: (function(){
return '<div class="def">대출을 받을 때 은행이 두 가지 기준으로 한도를 제한해요. 하나는 집값 대비 대출 비율인 <strong>LTV</strong>, 또 하나는 소득 대비 원리금 상환 비율인 <strong>DSR</strong>이에요. 둘 다 통과해야 대출이 나와요. 하나라도 초과하면 그 기준에 맞게 한도가 깎입니다.</div>'

+'<p class="sect-lead"><strong>DSR (Debt Service Ratio) — 연소득 대비 원리금 상환 비율</strong></p>'

function openModal(key) {
  var content = C[key];
  if (!content) return;
  document.getElementById('mIco').textContent = content.ico;
  document.getElementById('mTit').textContent = content.tit;
  document.getElementById('mBody').innerHTML = content.html;
  document.getElementById('ov').classList.add('open');
  document.getElementById('modal').scrollTop = 0;
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('ov').classList.remove('open');
  document.body.style.overflow = '';
}

function handleOvClick(e) {
  if (e.target === document.getElementById('ov')) closeModal();
}

function toggleSub(btn) {
  var inner = btn.nextElementSibling;
  if (!inner) return;
  var isOpen = inner.classList.contains('open');
  inner.classList.toggle('open', !isOpen);
  btn.classList.toggle('open', !isOpen);
  var span = btn.querySelector('span:first-child');
  if (span) {
    span.textContent = isOpen
      ? '📌 조심해야 할 것 — 현장에서 들을 수 있는 방법들 (클릭해서 열기)'
      : '📌 조심해야 할 것 — 닫기';
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});
</script>
